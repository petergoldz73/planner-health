<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cardio + Sono Planner</title>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;--text:#f0f0f0;--muted:#777;--green:#4ade80;--green-dim:#152b1e;--blue:#60a5fa;--blue-dim:#152038;--amber:#fbbf24;--amber-dim:#2e2008;--teal:#2dd4bf;--teal-dim:#0b2826;--purple:#a78bfa;--purple-dim:#1e1635;--red:#f87171;--r:14px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.app{max-width:500px;margin:0 auto;padding-bottom:130px}
.header{padding:20px 16px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.header h1{font-size:21px;font-weight:700;letter-spacing:-.5px}
.header p{font-size:13px;color:var(--muted);margin-top:3px}
.sticky-controls{position:sticky;top:65px;background:var(--bg);z-index:9;padding:10px 16px 0;border-bottom:1px solid var(--border);padding-bottom:10px}
.search-input{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;outline:none;margin-bottom:10px}
.search-input::placeholder{color:var(--muted)}
.cats{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.cats::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.cat-btn.active{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.section-label{padding:14px 16px 8px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.food-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.food-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px;cursor:pointer;transition:all .15s;display:flex;gap:11px;align-items:flex-start}
.food-item:active{transform:scale(.98)}
.food-item.selected{background:var(--green-dim);border-color:var(--green)}
.food-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.food-item.selected .food-check{background:var(--green);border-color:var(--green)}
.check-icon{display:none}
.food-item.selected .check-icon{display:block}
.food-body{flex:1;min-width:0}
.food-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px}
.food-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
.food-pts{font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--muted);flex-shrink:0}
.food-item.selected .food-pts{background:var(--green-dim);color:var(--green)}
.food-cat{font-size:11px;color:var(--muted);margin-bottom:5px}
.food-desc{font-size:13px;color:#aaa;line-height:1.5;margin-bottom:8px}
.food-bars{display:flex;flex-direction:column;gap:5px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--muted);width:70px;flex-shrink:0}
.bar-bg{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.bar-fill{height:4px;border-radius:2px;transition:width .3s}
.bar-val{font-size:11px;font-weight:600;width:20px;text-align:right;flex-shrink:0}
.b-cardio{background:var(--blue)}
.b-energia{background:var(--amber)}
.b-anti{background:var(--teal)}
.b-sono{background:var(--purple)}
.t-cardio{color:var(--blue)}
.t-energia{color:var(--amber)}
.t-anti{color:var(--teal)}
.t-sono{color:var(--purple)}
.empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:14px}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 16px 28px;z-index:20}
.bottom-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.count-info{font-size:13px;color:var(--muted)}
.count-info span{color:var(--text);font-weight:600}
.ver-btn{padding:13px 22px;background:var(--green);color:#000;font-size:14px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;flex-shrink:0}
.ver-btn:disabled{background:var(--surface2);color:var(--muted)}
.overlay{display:none;position:fixed;inset:0;z-index:30;background:var(--bg);overflow-y:auto}
.overlay.open{display:block}
.ov-wrap{max-width:500px;margin:0 auto;padding:20px 16px 60px}
.ov-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ov-header h2{font-size:18px;font-weight:700}
.score-hero{background:var(--surface);border-radius:var(--r);padding:22px;margin-bottom:14px;text-align:center}
.score-pct{font-size:68px;font-weight:800;letter-spacing:-3px;line-height:1}
.score-nota{font-size:17px;font-weight:600;margin-top:4px;margin-bottom:14px}
.score-bar-bg{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:14px}
.score-bar-fill{height:8px;border-radius:4px}
.score-insight{font-size:13px;color:#bbb;line-height:1.6;text-align:left}
.pillars-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.pillar-card{background:var(--surface);border-radius:var(--rs);padding:14px}
.pillar-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.pillar-val{font-size:22px;font-weight:700;margin-bottom:6px}
.pillar-bar-bg{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.pillar-bar-fill{height:4px;border-radius:2px}
.analysis-section{margin-bottom:14px}
.analysis-title{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
.analysis-card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:8px}
.analysis-food-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.analysis-food-cat{font-size:11px;color:var(--muted);margin-bottom:6px}
.analysis-bars{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.analysis-desc{font-size:13px;color:#aaa;line-height:1.5;margin-bottom:6px}
.analysis-tip{font-size:12px;color:var(--purple);line-height:1.5;border-left:2px solid var(--purple);padding-left:8px;margin-top:6px}
.combos-card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:8px}
.combo-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:#bbb;line-height:1.5}
.combo-item:last-child{border-bottom:none;padding-bottom:0}
.combo-item strong{color:var(--text)}
.gaps-card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:8px}
.gap-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;color:#bbb}
.gap-item:last-child{border-bottom:none}
.gap-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.chips-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.chip{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px}
.chip-x{color:var(--muted);font-size:15px;cursor:pointer;line-height:1}
.limpar-btn{width:100%;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:14px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Cardio + Sono Planner</h1>
    <p>monte seu dia — analise cardio, energia, antioxidante e sono</p>
  </div>
  <div class="sticky-controls">
    <input class="search-input" type="search" id="search" placeholder="buscar alimento..." autocomplete="off">
    <div class="cats" id="cats"></div>
  </div>
  <div class="section-label" id="listLabel">todos os alimentos</div>
  <div class="food-list" id="foodList"></div>
</div>

<div class="bottom-bar">
  <div class="bottom-inner">
    <div class="count-info">selecionados: <span id="countNum">0</span></div>
    <button class="ver-btn" id="verBtn" disabled onclick="openResult()">ver análise</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="ov-wrap">
    <div class="ov-header">
      <button class="back-btn" onclick="closeResult()">&#8592;</button>
      <h2>análise do seu dia</h2>
    </div>
    <div id="resultContent"></div>
  </div>
</div>

<script>
const foods = [
  // FRUTAS
  {id:'banana',name:'banana',cat:'frutas',pts:8,cardio:7,energia:10,anti:5,sono:9,desc:'Potássio essencial pra contração cardíaca e triptofano que vira melatonina à noite.',tip:'Comer 1h antes de dormir potencializa a produção de melatonina.'},
  {id:'kiwi',name:'kiwi',cat:'frutas',pts:8,cardio:7,energia:5,anti:9,sono:9,desc:'Vitamina C altíssima, melhora função plaquetária. Serotonina natural que melhora qualidade do sono.',tip:'2 kiwis 1h antes de dormir reduzem o tempo pra adormecer — efeito comprovado em estudos.'},

  {id:'mirtilo',name:'mirtilo',cat:'frutas',pts:9,cardio:9,energia:5,anti:10,sono:7,desc:'Antocianinas melhoram função endotelial e reduzem inflamação cardiovascular.',tip:'Antocianinas têm leve efeito calmante — pode consumir à noite sem problemas.'},
  {id:'uva_escura',name:'uva escura',cat:'frutas',pts:8,cardio:9,energia:7,anti:9,sono:8,desc:'Resveratrol protege o coração e melhora elasticidade vascular. Melatonina natural.',tip:'Uva escura contém melatonina natural — uma das poucas frutas com esse composto.'},

  {id:'mamão',name:'mamão',cat:'frutas',pts:6,cardio:6,energia:6,anti:7,sono:5,desc:'Papaína facilita digestão. Vitamina C e beta-caroteno com ação antioxidante.',tip:'Facilita a digestão noturna quando consumido após o jantar.'},
  {id:'maçã',name:'maçã',cat:'frutas',pts:6,cardio:6,energia:6,anti:7,sono:5,desc:'Quercetina anti-inflamatória, fibra solúvel que reduz colesterol LDL.',tip:'Neutra pro sono — pode consumir em qualquer horário.'},
  {id:'cereja',name:'cereja',cat:'frutas',pts:9,cardio:8,energia:5,anti:9,sono:10,desc:'Uma das poucas fontes naturais de melatonina. Antocianinas anti-inflamatórias.',tip:'A melhor fruta pro sono. Suco de cereja ácida é o mais estudado — tomar 30min antes de dormir.'},

const cats = ['todos', ...[...new Set(foods.map(f => f.cat))].sort()];
let activeFilter = 'todos';
let selected = new Set();

function renderCats() {
  document.getElementById('cats').innerHTML = cats.map(c =>
    `<button class="cat-btn${c === activeFilter ? ' active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(c) { activeFilter = c; renderCats(); renderFoods(); }

function renderFoods() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const list = foods.filter(f => {
    const mc = activeFilter === 'todos' || f.cat === activeFilter;
    const mq = !q || f.name.includes(q) || f.cat.includes(q) || f.desc.toLowerCase().includes(q);
    return mc && mq;
  });
  const label = document.getElementById('listLabel');
  label.textContent = q ? `resultado para "${q}"` : activeFilter === 'todos' ? 'todos os alimentos' : activeFilter;
  const el = document.getElementById('foodList');
  if (!list.length) { el.innerHTML = '<div class="empty">nenhum alimento encontrado</div>'; return; }
  el.innerHTML = list.map(f => {
    const sel = selected.has(f.id);
    return `<div class="food-item${sel ? ' selected' : ''}" onclick="toggle('${f.id}')">
      <div class="food-check">
        <svg class="check-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="food-body">
        <div class="food-top">
          <div class="food-name">${f.name}</div>
          <div class="food-pts">${f.pts}/10</div>
        </div>
        <div class="food-cat">${f.cat}</div>
        <div class="food-desc">${f.desc}</div>
        <div class="food-bars">
          <div class="bar-row"><span class="bar-label t-cardio">cardio</span><div class="bar-bg"><div class="bar-fill b-cardio" style="width:${f.cardio*10}%"></div></div><span class="bar-val t-cardio">${f.cardio}</span></div>
          <div class="bar-row"><span class="bar-label t-energia">energia</span><div class="bar-bg"><div class="bar-fill b-energia" style="width:${f.energia*10}%"></div></div><span class="bar-val t-energia">${f.energia}</span></div>
          <div class="bar-row"><span class="bar-label t-anti">antioxid.</span><div class="bar-bg"><div class="bar-fill b-anti" style="width:${f.anti*10}%"></div></div><span class="bar-val t-anti">${f.anti}</span></div>
          <div class="bar-row"><span class="bar-label t-sono">sono</span><div class="bar-bg"><div class="bar-fill b-sono" style="width:${f.sono*10}%"></div></div><span class="bar-val t-sono">${f.sono}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  renderFoods();
  updateCount();
}

function updateCount() {
  const n = selected.size;
  document.getElementById('countNum').textContent = n;
  document.getElementById('verBtn').disabled = n === 0;
}

function calcScore() {
  const sel = [...selected].map(id => foods.find(f => f.id === id));
  const avg = key => Math.round(sel.reduce((a, f) => a + f[key], 0) / sel.length);
  const total = sel.reduce((a, f) => a + f.pts, 0);
  const pct = Math.round((total / (sel.length * 10)) * 100);
  return { sel, pct, cardio: avg('cardio'), energia: avg('energia'), anti: avg('anti'), sono: avg('sono') };
}

function getNotaInfo(pct) {
  if (pct >= 90) return { nota: 'excelente', cor: '#4ade80' };
  if (pct >= 75) return { nota: 'muito bom', cor: '#34d399' };
  if (pct >= 60) return { nota: 'bom', cor: '#60a5fa' };
  if (pct >= 40) return { nota: 'regular', cor: '#fbbf24' };
  return { nota: 'fraco', cor: '#f87171' };
}

function getInsight(pct, cardio, energia, anti, sono, sel) {
  const hasPeixe = sel.some(f => f.cat === 'peixes');
  const hasSono = sel.some(f => f.sono >= 8);
  const hasNitrato = sel.some(f => ['beterraba','rúcula','espinafre','suco_beterraba','beterraba_po'].includes(f.id));
  const parts = [];
  if (pct >= 90) parts.push('Dia praticamente perfeito. Consistência por 2-3 semanas e o fôlego na corrida muda visivelmente.');
  else if (pct >= 75) parts.push('Alimentação muito sólida. Poucos ajustes pra chegar no nível ideal.');
  else if (pct >= 60) parts.push('Base razoável com espaço pra melhorar.');
  else if (pct >= 40) parts.push('Dá pra melhorar bastante com substituições simples.');
  else parts.push('Pouco impacto cardiovascular e no sono. Começa com 2-3 itens de alta pontuação.');
  if (!hasPeixe) parts.push('Nenhum peixe no dia — sardinha ou salmão no jantar seria o maior ganho único possível.');
  if (!hasNitrato) parts.push('Sem fonte de nitrato — beterraba em pó antes da corrida é o item mais impactante pro fôlego.');
  if (!hasSono) parts.push('Sono fraco na seleção — adiciona camomila, castanha-do-pará ou nozes pra dormir melhor antes do treino.');
  return parts.join(' ');
}

function detectCombos(sel) {
  const ids = sel.map(f => f.id);
  const combos = [];
  if (ids.includes('sardinha') && ids.includes('espinafre')) combos.push({ title: 'sardinha + espinafre', desc: 'Ferro heme (sardinha) + ferro não-heme (espinafre) + vitamina C natural = absorção máxima de ferro. Direto na capacidade de transporte de oxigênio.' });
  if ((ids.includes('lentilha') || ids.includes('espinafre') || ids.includes('feijão')) && (ids.includes('laranja') || ids.includes('acerola') || ids.includes('morango'))) combos.push({ title: 'ferro vegetal + vitamina C', desc: 'Vitamina C presente potencializa a absorção do ferro não-heme em até 3x. Um dos combos nutricionais mais impactantes.' });
  if (ids.includes('cúrcuma') && ids.includes('azeite')) combos.push({ title: 'cúrcuma + azeite', desc: 'Curcumina é lipossolúvel — a gordura do azeite aumenta muito sua absorção. Anti-inflamatório potente.' });
  if ((ids.includes('castanha_pa') || ids.includes('nozes') || ids.includes('amêndoa')) && (ids.includes('chá_camomila') || ids.includes('chá_maracujá') || ids.includes('chá_valeriana'))) combos.push({ title: 'oleaginosa + chá calmante', desc: 'Magnésio/triptofano das oleaginosas + flavonoides sedativos do chá = preparação completa pro sono. Tomar 30-60min antes de dormir.' });
  if ((ids.includes('banana') || ids.includes('uva_escura') || ids.includes('cereja')) && (ids.includes('iogurte') || ids.includes('kefir'))) combos.push({ title: 'fruta + probiótico', desc: 'Triptofano da fruta + cálcio do iogurte + probióticos = síntese de melatonina otimizada. Ótimo lanche noturno.' });
  if (ids.includes('salmão') && ids.includes('batata_doce')) combos.push({ title: 'salmão + batata-doce', desc: 'O jantar perfeito pré-corrida. Ômega 3 à noite + carboidrato de baixo IG que abastece glicogênio lentamente durante o sono.' });
  if (ids.includes('aveia') && (ids.includes('banana') || ids.includes('mel'))) combos.push({ title: 'aveia + banana/mel', desc: 'Carboidrato complexo + simples juntos facilitam o transporte de triptofano pro cérebro. Clássico pra indução do sono.' });
  if (ids.includes('alho') && (ids.includes('beterraba') || ids.includes('rúcula') || ids.includes('espinafre'))) combos.push({ title: 'alho + nitratos', desc: 'Alicina + óxido nítrico = vasodilatação dupla. Circulação muito mais eficiente pra corrida.' });
  return combos;
}

function detectGaps(sel) {
  const ids = sel.map(f => f.id);
  const gaps = [];
  const hasPeixe = sel.some(f => f.cat === 'peixes');
  const hasNitrato = sel.some(f => ['beterraba','rúcula','espinafre','suco_beterraba','beterraba_po'].includes(f.id));
  const hasSonoAlto = sel.some(f => f.sono >= 8);
  const hasOmega = hasPeixe || ids.includes('nozes') || ids.includes('chia') || ids.includes('linhaça') || ids.includes('omega3');
  const hasFerro = hasPeixe || ids.includes('fígado') || ids.includes('espinafre') || ids.includes('lentilha') || ids.includes('feijão');
  const hasMag = ids.some(id => ['amêndoa','castanha_pa','espinafre','abacate','magnésio','quinoa','semente_abob'].includes(id));
  const hasVitC = ids.some(id => ['laranja','acerola','morango','kiwi','couve'].includes(id));
  if (!hasPeixe) gaps.push({ cor: '#f87171', msg: 'Sem peixe no dia — perde o maior aporte de ômega 3 e ferro heme biodisponível.' });
  if (!hasNitrato) gaps.push({ cor: '#f87171', msg: 'Sem fonte de nitrato — vasodilatação comprometida. Beterraba, rúcula ou espinafre resolvem.' });
  if (!hasSonoAlto) gaps.push({ cor: '#fbbf24', msg: 'Sono fraco na seleção. Adicione camomila, cereja, nozes ou castanha-do-pará pra dormir melhor.' });
  if (!hasOmega) gaps.push({ cor: '#fbbf24', msg: 'Sem ômega 3 identificado — inflamação mais alta e sono REM comprometido.' });
  if (!hasFerro) gaps.push({ cor: '#fbbf24', msg: 'Sem fonte significativa de ferro — transporte de O₂ no sangue fica limitado.' });
  if (!hasMag) gaps.push({ cor: '#60a5fa', msg: 'Pouco magnésio — mineral essencial pra relaxamento muscular e qualidade do sono profundo.' });
  if (!hasVitC) gaps.push({ cor: '#60a5fa', msg: 'Sem vitamina C — absorção de ferro vegetal cai muito sem ela.' });
  return gaps;
}

function openResult() {
  if (!selected.size) return;
  const { sel, pct, cardio, energia, anti, sono } = calcScore();
  const { nota, cor } = getNotaInfo(pct);
  const insight = getInsight(pct, cardio, energia, anti, sono, sel);
  const combos = detectCombos(sel);
  const gaps = detectGaps(sel);

  const pillarBar = (val, c) => `<div class="pillar-bar-bg"><div class="pillar-bar-fill" style="width:${val*10}%;background:${c}"></div></div>`;

    `<div class="chip">${f.name}<span class="chip-x" onclick="removeChip('${f.id}')">×</span></div>`

      <div class="score-nota" style="color:${cor}">${nota}</div>

      <div class="score-insight">${insight}</div>
    </div>

    <div class="pillars-grid">
      <div class="pillar-card"><div class="pillar-label">saúde cardíaca</div><div class="pillar-val" style="color:${cor}">${cardio}<span style="font-size:13px;color:var(--muted)">/10</span></div>${pillarBar(cardio,cor)}</div>
      <div class="pillar-card"><div class="pillar-label">energia aeróbica</div><div class="pillar-val" style="color:${cor}">${energia}<span style="font-size:13px;color:var(--muted)">/10</span></div>${pillarBar(energia,cor)}</div>
      <div class="pillar-card"><div class="pillar-label">antioxidante</div><div class="pillar-val" style="color:${cor}">${anti}<span style="font-size:13px;color:var(--muted)">/10</span></div>${pillarBar(anti,cor)}</div>
      <div class="pillar-card"><div class="pillar-label">qualidade do sono</div><div class="pillar-val" style="color:var(--purple)">${sono}<span style="font-size:13px;color:var(--muted)">/10</span></div>${pillarBar(sono,'var(--purple)')}</div>
    </div>

    <div class="analysis-section">
      <div class="analysis-title">gaps e alertas</div>
      <div class="gaps-card">${gapsHtml}</div>
    </div>

    <div class="analysis-section">
      <div class="analysis-title">combinações sinérgicas detectadas</div>
      <div class="combos-card">${combosHtml}</div>
    </div>

    <div class="analysis-section">
      <div class="analysis-title">análise por alimento</div>
      ${foodCards}
    </div>

    <div class="analysis-title">itens selecionados</div>
    <div class="chips-wrap">${chips}</div>
    <button class="limpar-btn" onclick="limpar()">limpar tudo e começar de novo</button>
  `;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').scrollTop = 0;
}

function removeChip(id) {
  selected.delete(id);
  updateCount();
  if (!selected.size) { closeResult(); return; }
  openResult();
}

function closeResult() {
  document.getElementById('overlay').classList.remove('open');
  renderFoods();
}

function limpar() {
  selected.clear();
  updateCount();
  closeResult();
}

document.getElementById('search').addEventListener('input', renderFoods);
renderCats();
renderFoods();
</script>
</body>
</html>
